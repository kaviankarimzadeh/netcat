{{- if and .Values.controller.enabled .Values.controller.hub.enabled .Values.controller.hub.token (not .Values.controller.hub.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "netcat.controllerName" . }}-hub
  namespace: {{ include "netcat.namespace" . }}
  labels:
    {{- include "netcat.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.controller.hub.token | quote }}
{{- end }}
