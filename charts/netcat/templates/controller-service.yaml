{{- if .Values.controller.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "netcat.controllerName" . }}
  namespace: {{ include "netcat.namespace" . }}
  labels:
    {{- include "netcat.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
  {{- with .Values.controller.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.controller.service.type }}
  selector:
    {{- include "netcat.controllerSelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.controller.service.port }}
      targetPort: {{ .Values.controller.port }}
      protocol: TCP
{{- end }}
