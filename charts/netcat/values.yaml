# ============================================================================
# netcat - multi-cluster connectivity probe (hub mode)
# ============================================================================
# Architecture:
#   - Agent DaemonSet runs on every node of every "source" cluster. Each
#     agent dials OUT to the controller over HTTPS and keeps an SSE
#     connection open.
#   - Controller Deployment runs in ONE cluster. Exposes the web UI and
#     dispatches probe jobs down the open agent connections.
#
# Install patterns (one chart, two invocations):
#   1. On the hub cluster:        controller.enabled=true,  agent.enabled=false
#   2. On every source cluster:   controller.enabled=false, agent.enabled=true
#                                 + agent.hub.url, agent.hub.cluster,
#                                   agent.hub.token (must match controller's)
# ============================================================================

nameOverride: ""
fullnameOverride: ""

# The namespace comes from `helm install --namespace`. Create it with
# `--create-namespace` if it doesn't exist, or manage it separately.

image:
  registry: kaviankarimzadeh
  agentRepository: netcat-agent
  controllerRepository: netcat-controller
  tag: ""                 # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent
  pullSecrets: []

commonLabels: {}

# ---------------------------------------------------------------------------
# Agent (DaemonSet) — deploy to EVERY cluster you want to probe from.
# ---------------------------------------------------------------------------
agent:
  enabled: true

  # hostNetwork makes probes originate from the node's real NIC, which
  # is what you want for "can this node reach X?".
  hostNetwork: true
  dnsPolicy: ClusterFirstWithHostNet

  # Bind agent port on the node. Set to 0 to skip hostPort entirely.
  # The agent's HTTP endpoint is only used for health probes now that
  # all control traffic flows through the outbound SSE connection.
  hostPort: 8080
  port: 8080
  listenAddr: ":8080"

  # Run on control-plane nodes too.
  tolerateAll: true
  tolerations: []
  nodeSelector: {}
  affinity: {}

  resources:
    requests: { cpu: "10m", memory: "16Mi" }
    limits:   { cpu: "100m", memory: "64Mi" }

  podAnnotations: {}
  priorityClassName: ""

  hub:
    # Controller URL the agent dials out to. Required.
    url: ""                   # e.g. https://netcat.example.com
    # Display name of this cluster in the UI. Required.
    cluster: ""
    # Shared bearer token the controller uses to authenticate agents.
    # Generate with:  openssl rand -base64 32
    # Provide inline OR reference an existing Secret with key `token`.
    token: ""
    existingSecret: ""
    existingSecretKey: token

# ---------------------------------------------------------------------------
# Controller (Deployment + UI) — deploy to ONE hub cluster.
# ---------------------------------------------------------------------------
controller:
  enabled: false

  replicaCount: 1
  port: 8080
  listenAddr: ":8080"

  # Per-probe timeout sent down to the agent (ms).
  probeTimeoutMs: 3000
  # How long the controller waits for an agent to reply (ms).
  agentTimeoutMs: 8000

  hub:
    # Shared bearer token. MUST match agent.hub.token on every source
    # cluster. Leave all three empty to run with no authentication
    # (dev/testing only — do not do this with a public Ingress).
    token: ""
    existingSecret: ""
    existingSecretKey: token

  resources:
    requests: { cpu: "25m", memory: "48Mi" }
    limits:   { cpu: "500m", memory: "256Mi" }

  podAnnotations: {}
  priorityClassName: ""

  service:
    type: ClusterIP
    port: 80
    annotations: {}

  # -------- Exposure: HTTPRoute (preferred, Gateway API) -------------------
  # Requires the Gateway API CRDs (gateway.networking.k8s.io/v1) installed
  # in the cluster and a Gateway already created. Disable this and enable
  # `ingress` instead if you don't have a Gateway.
  httpRoute:
    enabled: true
    parentRefs:
      - name: gateway
        namespace: gateway
    hostnames:
      - netcat.example.com
    annotations: {}
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        # filters: []
        # timeouts:
        #   request: 30s

  # -------- Exposure: Ingress (fallback) -----------------------------------
  ingress:
    enabled: false
    className: ""
    host: netcat.example.com
    path: /
    pathType: Prefix
    annotations: {}
    tls: false
    tlsSecretName: ""
