<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>netcat · connectivity probe</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23818cf8'/><circle cx='16' cy='16' r='3' fill='white'/></svg>" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
    <script>
      // Apply the saved (or system-preferred) theme before first paint to
      // avoid a flash of the wrong theme.
      (function () {
        try {
          var saved = localStorage.getItem('netcat:theme');
          var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
          var theme = saved || (prefersLight ? 'light' : 'dark');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (_) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body class="min-h-screen">
    <div class="bg-aurora fixed inset-0 -z-10"></div>

    <main class="mx-auto max-w-6xl px-6 py-10">
      <header class="mb-10 flex items-center justify-between gap-6">
        <div>
          <h1 class="text-2xl font-bold tracking-tight">netcat</h1>
          <p class="text-sm text-slate-400">multi-cluster node-level connectivity probe</p>
        </div>
        <div class="flex items-center gap-3">
          <div id="clusterChips" class="flex flex-wrap gap-2"></div>
          <button id="themeToggle" type="button" class="theme-toggle" aria-label="Toggle color theme" title="Toggle theme">
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" />
            </svg>
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="4" />
              <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
            </svg>
          </button>
        </div>
      </header>

      <section class="glass rounded-2xl p-6 shadow-2xl shadow-black/30">
        <form id="probeForm" class="grid grid-cols-1 gap-4 md:grid-cols-[1fr_160px_120px_auto]">
          <div>
            <label class="mb-1 block text-xs font-medium uppercase tracking-wider text-slate-400">Host / IP</label>
            <input
              id="host"
              name="host"
              required
              autocomplete="off"
              placeholder="api.example.com"
              class="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 font-mono text-sm text-slate-100 outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-400/40"
            />
          </div>
          <div>
            <label class="mb-1 block text-xs font-medium uppercase tracking-wider text-slate-400">Port</label>
            <input
              id="port"
              name="port"
              type="number"
              min="1"
              max="65535"
              required
              value="443"
              class="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 font-mono text-sm text-slate-100 outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-400/40"
            />
          </div>
          <div>
            <label class="mb-1 block text-xs font-medium uppercase tracking-wider text-slate-400">Protocol</label>
            <select
              id="proto"
              name="proto"
              class="nc-select w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 font-mono text-sm text-slate-100 outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-400/40"
            >
              <option value="tcp">TCP</option>
              <option value="udp">UDP</option>
            </select>
          </div>
          <div class="flex items-end">
            <button
              id="runBtn"
              type="submit"
              class="w-full rounded-xl bg-gradient-to-r from-indigo-500 to-fuchsia-500 px-6 py-3 font-semibold text-white shadow-lg shadow-indigo-500/30 transition hover:brightness-110 active:scale-[0.98] disabled:opacity-50 md:w-auto"
            >
              Probe
            </button>
          </div>
        </form>

        <div id="summary" class="mt-6 hidden grid-cols-2 gap-4 md:grid-cols-4">
          <div class="stat"><div class="stat-label">Targets</div><div id="statTargets" class="stat-value">0</div></div>
          <div class="stat"><div class="stat-label">Success</div><div id="statOk" class="stat-value text-emerald-400">0</div></div>
          <div class="stat"><div class="stat-label">Failed</div><div id="statFail" class="stat-value text-rose-400">0</div></div>
          <div class="stat"><div class="stat-label">Avg latency</div><div id="statLatency" class="stat-value">—</div></div>
        </div>
      </section>

      <div id="resultsToolbar" class="mt-8 mb-3 hidden items-center justify-between gap-3">
        <div class="flex items-center gap-2 text-xs uppercase tracking-wider text-slate-400">
          <span id="resultsCount">0 clusters</span>
        </div>
        <div class="flex items-center gap-2">
          <label class="nc-switch" title="Hide successful probes">
            <input type="checkbox" id="failOnly" />
            <span class="nc-switch-track"><span class="nc-switch-thumb"></span></span>
            <span class="nc-switch-label">Only failures</span>
          </label>
          <button id="expandAll"   type="button" class="nc-pill-btn" title="Expand every cluster">Expand all</button>
          <button id="collapseAll" type="button" class="nc-pill-btn" title="Collapse every cluster">Collapse all</button>
        </div>
      </div>

      <section id="results" class="space-y-4"></section>

      <footer class="mt-12 text-center text-xs text-slate-500">
        probes run from the node's host network · TCP uses connect() · UDP is best-effort
      </footer>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
